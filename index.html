    }
    if (newCfg.tgToken && newCfg.tgChatId) {
      await tgNotify('🎉 <b>Paz Project v2</b> đã kết nối!\n\nCác lệnh hỗ trợ:\n/list — Xem dự án\n/add — Thêm dự án mới\n/status — Cập nhật trạng thái\n/help — Trợ giúp');
      showToast('✅ Đã gửi tin test!');
    }
  }}, ['Lưu & Sync']));

  // Polling toggle
  const pollingBtn = btn({ className: 'btn ' + (S.tgPolling ? 'btn-danger' : 'btn-secondary'), onClick: () => {
    if (S.tgPolling) {
      stopPolling();
      showToast('🔴 Đã tắt bot polling');
    } else {
      const c = getConfig();
      if (!c.tgToken || !c.tgChatId) { showToast('❌ Lưu Token và Chat ID trước!'); return; }
      startPolling();
      showToast('🟢 Bot đang lắng nghe...');
    }
    render();
  }}, [S.tgPolling ? '🔴 Tắt Bot' : '🟢 Bật Bot (Polling)']);
  tgBtnRow.appendChild(pollingBtn);
  tgCard.appendChild(tgBtnRow);

  tgCard.appendChild(div({ className: 'warn-box', style: { marginTop: 12 } }, [
    '⚠️ Bot chỉ nhận lệnh khi app đang mở trên ít nhất 1 thiết bị. Đây là giới hạn của app HTML — không cần server.',
  ]));

  // Command log
  const logWrap = div({ style: { marginTop: 12 } });
  logWrap.appendChild(div({ style: { fontSize: 11, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 6 } }, ['Nhật ký lệnh Telegram']));
  const logEl = div({ id: 'tg-cmd-log', className: 'cmd-log' });
  logEl.innerHTML = S.tgLog.length
    ? S.tgLog.map(l => `<div class="cmd-log-line ${l.type}">[${l.ts}] ${l.line}</div>`).join('')
    : '<div class="cmd-log-line info">Chưa có lệnh nào. Bật Bot và gửi /help từ Telegram.</div>';
  logWrap.appendChild(logEl);
  tgCard.appendChild(logWrap);

  wrap.appendChild(tgCard);
}

// ── Modals ─────────────────────────────────────────────────────────────────────
function renderModal(app) {
  const overlay = div({ className: 'modal-overlay', onClick: e => { if (e.target === overlay) setState({ modal: null, modalData: null }); } });
  const modal = div({ className: 'modal' });

  if (S.modal === 'new_project' || S.modal === 'edit_project') {
    const isEdit = S.modal === 'edit_project';
    const p = isEdit ? getSelectedProject() : null;
    modal.appendChild(div({ className: 'modal-header' }, [
      div({ className: 'modal-title display' }, [isEdit ? 'Sửa dự án' : 'Dự án mới']),
      btn({ className: 'modal-close', onClick: () => setState({ modal: null }) }, ['×']),
    ]));
    const nameInp     = inp({ className: 'input', placeholder: 'Tên dự án (ví dụ: Logo Café Bình Yên)', value: p?.name || '' });
    const clientInp   = inp({ className: 'input', placeholder: 'Tên khách hàng', value: p?.client || '' });
    const deadlineInp = inp({ className: 'input', type: 'date', value: p?.deadline || '' });
    const notesInp    = txt({ className: 'input', placeholder: 'Ghi chú...', style: { height: 80, resize: 'vertical' } });
    if (p?.notes) notesInp.value = p.notes;

    // VAT fields — link together reactively
    const savedVat = p?.vatRate ?? 10;
    const savedBefore = p?.contractValueBeforeVat || '';
    const savedAfter  = p?.contractValue || '';

    const vatRateInp = el('select', { className: 'input', style: { width: '100%' } }, [
      el('option', { value: 0,  ...(savedVat === 0  ? { selected: '' } : {}) }, ['0% — Không có thuế']),
      el('option', { value: 5,  ...(savedVat === 5  ? { selected: '' } : {}) }, ['5% GTGT']),
      el('option', { value: 8,  ...(savedVat === 8  ? { selected: '' } : {}) }, ['8% GTGT']),
      el('option', { value: 10, ...(savedVat === 10 ? { selected: '' } : {}) }, ['10% GTGT']),
    ]);
    const beforeVatInp = inp({ className: 'input', placeholder: 'Giá chưa thuế', type: 'number', value: savedBefore });
    const afterVatInp  = inp({ className: 'input', placeholder: 'Giá đã có thuế', type: 'number', value: savedAfter });
    const vatAmtDisp   = div({ style: { fontSize: 11, color: 'var(--text3)', marginTop: 4, minHeight: 16 } });

    const updateVatDisplay = () => {
      const rate = Number(vatRateInp.value) / 100;
      const before = Number(beforeVatInp.value) || 0;
      const after  = Number(afterVatInp.value) || 0;
      if (before) {
        vatAmtDisp.textContent = rate ? `Tiền thuế: ${fmtMoney(Math.round(before * rate))} → Tổng: ${fmtMoney(Math.round(before * (1 + rate)))}` : '';
      } else if (after) {
        vatAmtDisp.textContent = rate ? `Giá chưa thuế: ${fmtMoney(Math.round(after / (1 + rate)))} · Tiền thuế: ${fmtMoney(Math.round(after - after / (1 + rate)))}` : '';
      } else {
        vatAmtDisp.textContent = '';
      }
    };

    // Sync: typing before → auto-fill after
    beforeVatInp.addEventListener('input', () => {
      const rate = Number(vatRateInp.value) / 100;
      const before = Number(beforeVatInp.value);
      if (before && rate) afterVatInp.value = Math.round(before * (1 + rate));
      else if (before && !rate) afterVatInp.value = before;
      updateVatDisplay();
    });
    // Sync: typing after → auto-fill before
    afterVatInp.addEventListener('input', () => {
      const rate = Number(vatRateInp.value) / 100;
      const after = Number(afterVatInp.value);
      if (after && rate) beforeVatInp.value = Math.round(after / (1 + rate));
      else if (after && !rate) beforeVatInp.value = after;
      updateVatDisplay();
    });
    vatRateInp.addEventListener('change', () => {
      // recalculate from beforeVat if available
      const rate = Number(vatRateInp.value) / 100;
      const before = Number(beforeVatInp.value);
      if (before) afterVatInp.value = Math.round(before * (1 + rate));
      updateVatDisplay();
    });
    updateVatDisplay();

    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Tên dự án *']), nameInp]));
    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Khách hàng']), clientInp]));
    modal.appendChild(div({ className: 'field' }, [
      el('label', { className: 'input-label' }, ['Thuế GTGT']),
      vatRateInp,
    ]));
    modal.appendChild(div({ className: 'grid-2' }, [
      div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Giá chưa thuế (đ)']), beforeVatInp]),
      div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Giá đã có thuế (đ)']), afterVatInp]),
    ]));
    modal.appendChild(vatAmtDisp);
    modal.appendChild(div({ style: { height: 8 } }));
    modal.appendChild(div({ className: 'grid-2' }, [
      div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Deadline']), deadlineInp]),
    ]));

    // ── Hạng mục dịch vụ (tự điền, chỉ khi tạo mới) ────────────────────────
    // packages = [{name, roundCount}]
    let customPkgs = [{ name: '', roundCount: 4 }];
    if (!isEdit) {
      const pkgField = div({ className: 'field' });
      pkgField.appendChild(el('label', { className: 'input-label' }, ['Hạng mục dịch vụ']));

      const pkgList = div({ style: { display: 'flex', flexDirection: 'column', gap: 6 } });

      const renderPkgRows = () => {
        pkgList.innerHTML = '';
        customPkgs.forEach((pkg, i) => {
          const row = div({ style: { display: 'flex', gap: 6, alignItems: 'center' } });

          const nameI = inp({
            className: 'input',
            placeholder: 'Tên hạng mục (vd: Logo, Bảng hiệu...)',
            value: pkg.name,
            style: { flex: 1 },
            onInput: e => { customPkgs[i].name = e.target.value; },
          });

          const countI = inp({
            className: 'input',
            type: 'number',
            min: 1, max: 10,
            value: pkg.roundCount,
            style: { width: 80, textAlign: 'center' },
            onInput: e => { customPkgs[i].roundCount = Number(e.target.value) || 4; },
          });

          const countWrap = div({ style: { display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, flexShrink: 0 } });
          countWrap.appendChild(countI);
          countWrap.appendChild(div({ style: { fontSize: 10, color: 'var(--text3)', whiteSpace: 'nowrap' } }, ['rounds']));

          const delBtn = btn({
            className: 'btn btn-ghost btn-sm',
            style: { color: 'var(--text3)', padding: '6px 8px', flexShrink: 0, visibility: customPkgs.length > 1 ? 'visible' : 'hidden' },
            onClick: () => { customPkgs.splice(i, 1); renderPkgRows(); },
          }, ['✕']);

          row.appendChild(nameI);
          row.appendChild(countWrap);
          row.appendChild(delBtn);
          pkgList.appendChild(row);
        });
      };

      renderPkgRows();
      pkgField.appendChild(pkgList);

      const addPkgBtn = btn({
        className: 'btn btn-ghost btn-sm',
        style: { marginTop: 6, color: 'var(--accent)' },
        onClick: () => { customPkgs.push({ name: '', roundCount: 4 }); renderPkgRows(); },
      }, ['+ Thêm hạng mục']);
      pkgField.appendChild(addPkgBtn);
      pkgField.appendChild(div({ style: { fontSize: 11, color: 'var(--text3)', marginTop: 5 } }, ['Điền tên hạng mục và số rounds. Bỏ trống tên = dùng rounds mặc định.']));
      modal.appendChild(pkgField);
    }

    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Ghi chú']), notesInp]));
    modal.appendChild(div({ style: { display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 8 } }, [
      btn({ className: 'btn btn-secondary', onClick: () => setState({ modal: null }) }, ['Huỷ']),
      btn({ className: 'btn btn-primary', onClick: async () => {
        const name = nameInp.value.trim();
        if (!name) { showToast('❌ Nhập tên dự án!'); return; }
        const projects = getProjects();
        const contractValue = afterVatInp.value ? Number(afterVatInp.value) : null;
        const contractValueBeforeVat = beforeVatInp.value ? Number(beforeVatInp.value) : null;
        const vatRate = Number(vatRateInp.value);
        if (isEdit) {
          const idx = projects.findIndex(x => x.id === S.selectedId);
          projects[idx] = { ...projects[idx], name, client: clientInp.value.trim(), contractValue, contractValueBeforeVat, vatRate, deadline: deadlineInp.value || null, notes: notesInp.value.trim() || null };
          if (contractValue && (!projects[idx].payments || !projects[idx].payments.length)) {
            projects[idx].payments = calcPayments(contractValue);
          }
        } else {
          const validPkgs = customPkgs.filter(x => x.name.trim());
          const newP = {
            id: genId(), name, client: clientInp.value.trim(), contractValue, contractValueBeforeVat, vatRate,
            deadline: deadlineInp.value || null, notes: notesInp.value.trim() || null,
            status: 'new', createdAt: new Date().toISOString(),
            servicePackages: validPkgs,
            rounds: buildRoundsFromPackages(validPkgs),
            payments: contractValue ? calcPayments(contractValue) : [],
            docs: {}, logs: [],
          };
          projects.push(newP);
          const pkgLabels = validPkgs.map(x => x.name).filter(Boolean).join(', ');
          tgNotify(`📁 <b>Paz Project</b> — Dự án mới!\n\n📁 <b>${name}</b>\n👤 ${clientInp.value.trim() || 'Chưa rõ'}${contractValueBeforeVat ? '\n💰 ' + fmtMoney(contractValueBeforeVat) + ' (chưa thuế)' : ''}${contractValue ? '\n💰 ' + fmtMoney(contractValue) + ' (đã thuế ' + vatRate + '%)' : ''}${pkgLabels ? '\n🎨 ' + pkgLabels : ''}`);
        }
        await saveAndSync(projects);
        setState({ modal: null, ...(isEdit ? {} : { view: 'detail', selectedId: projects[projects.length - 1].id, tab: 'overview' }) });
        showToast(isEdit ? '✅ Đã cập nhật' : '✅ Đã tạo dự án!');
      }}, [isEdit ? 'Lưu' : 'Tạo dự án']),
    ]));
  }

  else if (S.modal === 'edit_rounds') {
    const p = getSelectedProject();
    modal.appendChild(div({ className: 'modal-header' }, [
      div({ className: 'modal-title display' }, ['🎨 Quản lý Rounds']),
      btn({ className: 'modal-close', onClick: () => setState({ modal: null }) }, ['×']),
    ]));

    let rounds = JSON.parse(JSON.stringify(p.rounds || []));

    // Normalise servicePackages
    const pkgs = (p.servicePackages || [])
      .map(pkg => typeof pkg === 'string' ? { name: pkg, roundCount: null } : pkg)
      .filter(pkg => pkg && pkg.name);

    // Migrate: assign pkg by position if missing
    if (pkgs.length) {
      let idx = 0;
      pkgs.forEach(pkg => {
        const n = pkg.roundCount || Math.ceil((p.rounds || []).length / pkgs.length);
        for (let i = 0; i < n && idx < rounds.length; i++, idx++) {
          if (!rounds[idx].pkg) rounds[idx].pkg = pkg.name;
        }
      });
    }

    const roundsList = div({});

    const renderRoundsList = () => {
      roundsList.innerHTML = '';

      // If project has packages, render grouped by package
      if (pkgs.length) {
        // Build groups
        const groups = {};
        rounds.forEach((r, globalIdx) => {
          let key = r.pkg;
          if (!key) { const m = r.label.match(/^\[(.+?)\]/); key = m ? m[1] : '__none__'; }
          if (!groups[key]) groups[key] = [];
          groups[key].push({ r, globalIdx });
        });

        pkgs.forEach(pkg => {
          const pkgName = typeof pkg === 'string' ? pkg : pkg.name;
          if (!pkgName) return;
          const pkgRounds = groups[pkgName] || [];

          // Package header
          const pkgHeader = div({ style: {
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            background: 'var(--accent-bg)', borderRadius: 'var(--r8)',
            padding: '8px 12px', marginBottom: 6,
            border: '1px solid var(--accent)',
          }});
          pkgHeader.appendChild(div({ style: { fontSize: 13, fontWeight: 700, color: 'var(--accent)' } }, ['🎨 ' + pkgName]));
          pkgHeader.appendChild(btn({ className: 'btn btn-ghost btn-sm', style: { color: 'var(--accent)', fontSize: 11 }, onClick: () => {
            const newRound = { label: `Round ${pkgRounds.length + 1}`, status: 'pending', date: null, note: '', feedback: '', pkg: pkgName };
            rounds.push(newRound);
            renderRoundsList();
          }}, ['+ Round']));
          roundsList.appendChild(pkgHeader);

          if (!pkgRounds.length) {
            roundsList.appendChild(div({ style: { fontSize: 12, color: 'var(--text3)', fontStyle: 'italic', padding: '6px 12px', marginBottom: 8 } }, ['Chưa có round nào']));
          }

          pkgRounds.forEach(({ r, globalIdx }) => {
            const gi = globalIdx; // capture
            const row = div({ style: { background: 'var(--surface2)', borderRadius: 'var(--r8)', padding: '10px 12px', marginBottom: 6, marginLeft: 8 } });

            // Row header: round name + status + delete
            const top = div({ style: { display: 'flex', gap: 8, alignItems: 'center', marginBottom: 8 } });
            const labelInp = inp({ className: 'input', value: r.label.replace(/^\[.*?\]\s*/, ''), style: { flex: 1, fontSize: 13, fontWeight: 500 }, onInput: e => { rounds[gi].label = e.target.value; } });
            const statusSel = el('select', { className: 'input', style: { width: 120, fontSize: 12 }, onChange: e => { rounds[gi].status = e.target.value; } }, [
              el('option', { value: 'pending',    ...(r.status === 'pending'    ? { selected: '' } : {}) }, ['⬜ Chưa làm']),
              el('option', { value: 'inprogress', ...(r.status === 'inprogress' ? { selected: '' } : {}) }, ['🟡 Đang làm']),
              el('option', { value: 'review',     ...(r.status === 'review'     ? { selected: '' } : {}) }, ['🟣 Chờ duyệt']),
              el('option', { value: 'done',       ...(r.status === 'done'       ? { selected: '' } : {}) }, ['🟢 Xong']),
            ]);
            const delBtn = btn({ className: 'btn btn-ghost btn-sm', style: { color: 'var(--red)', flexShrink: 0 }, onClick: () => { rounds.splice(gi, 1); renderRoundsList(); } }, ['🗑']);
            top.appendChild(labelInp); top.appendChild(statusSel); top.appendChild(delBtn);
            row.appendChild(top);

            // Date + note + feedback in a compact grid
            const dateInp = inp({ className: 'input', type: 'date', value: r.date || '', style: { marginBottom: 6, fontSize: 12 }, onChange: e => { rounds[gi].date = e.target.value; } });
            const noteInp = inp({ className: 'input', placeholder: '📝 Ghi chú...', value: r.note || '', style: { marginBottom: 6, fontSize: 12 }, onInput: e => { rounds[gi].note = e.target.value; } });
            const fbInp   = inp({ className: 'input', placeholder: '💬 Phản hồi của khách...', value: r.feedback || '', style: { fontSize: 12 }, onInput: e => { rounds[gi].feedback = e.target.value; } });
            row.appendChild(dateInp); row.appendChild(noteInp); row.appendChild(fbInp);
            roundsList.appendChild(row);
          });

          // Spacer between packages
          roundsList.appendChild(div({ style: { height: 8 } }));
        });

        // Ungrouped rounds
        const ungrouped = groups['__none__'] || [];
        if (ungrouped.length) {
          roundsList.appendChild(div({ style: { fontSize: 12, fontWeight: 600, color: 'var(--text3)', marginBottom: 6 } }, ['Rounds khác']));
          ungrouped.forEach(({ r, globalIdx }) => {
            const gi = globalIdx;
            const row = div({ style: { background: 'var(--surface2)', borderRadius: 'var(--r8)', padding: '10px 12px', marginBottom: 6 } });
            const top = div({ style: { display: 'flex', gap: 8, alignItems: 'center', marginBottom: 8 } });
            const labelInp = inp({ className: 'input', value: r.label, style: { flex: 1, fontSize: 13 }, onInput: e => { rounds[gi].label = e.target.value; } });
            const statusSel = el('select', { className: 'input', style: { width: 120, fontSize: 12 }, onChange: e => { rounds[gi].status = e.target.value; } }, [
              el('option', { value: 'pending',    ...(r.status === 'pending'    ? { selected: '' } : {}) }, ['⬜ Chưa làm']),
              el('option', { value: 'inprogress', ...(r.status === 'inprogress' ? { selected: '' } : {}) }, ['🟡 Đang làm']),
              el('option', { value: 'review',     ...(r.status === 'review'     ? { selected: '' } : {}) }, ['🟣 Chờ duyệt']),
              el('option', { value: 'done',       ...(r.status === 'done'       ? { selected: '' } : {}) }, ['🟢 Xong']),
            ]);
            const delBtn = btn({ className: 'btn btn-ghost btn-sm', style: { color: 'var(--red)' }, onClick: () => { rounds.splice(gi, 1); renderRoundsList(); } }, ['🗑']);
            top.appendChild(labelInp); top.appendChild(statusSel); top.appendChild(delBtn);
            row.appendChild(top);
            roundsList.appendChild(row);
          });
        }

      } else {
        // No packages — flat list
        rounds.forEach((r, i) => {
          const row = div({ style: { background: 'var(--surface2)', borderRadius: 'var(--r8)', padding: '10px 12px', marginBottom: 8 } });
          const top = div({ style: { display: 'flex', gap: 8, alignItems: 'center', marginBottom: 8 } });
          const labelInp = inp({ className: 'input', value: r.label, style: { flex: 1, fontSize: 13 }, onInput: e => { rounds[i].label = e.target.value; } });
          const statusSel = el('select', { className: 'input', style: { width: 120, fontSize: 12 }, onChange: e => { rounds[i].status = e.target.value; } }, [
            el('option', { value: 'pending',    ...(r.status === 'pending'    ? { selected: '' } : {}) }, ['⬜ Chưa làm']),
            el('option', { value: 'inprogress', ...(r.status === 'inprogress' ? { selected: '' } : {}) }, ['🟡 Đang làm']),
            el('option', { value: 'review',     ...(r.status === 'review'     ? { selected: '' } : {}) }, ['🟣 Chờ duyệt']),
            el('option', { value: 'done',       ...(r.status === 'done'       ? { selected: '' } : {}) }, ['🟢 Xong']),
          ]);
          const delBtn = btn({ className: 'btn btn-ghost btn-sm', style: { color: 'var(--red)' }, onClick: () => { rounds.splice(i, 1); renderRoundsList(); } }, ['🗑']);
          top.appendChild(labelInp); top.appendChild(statusSel); top.appendChild(delBtn);
          row.appendChild(top);
          const dateInp = inp({ className: 'input', type: 'date', value: r.date || '', style: { marginBottom: 6, fontSize: 12 }, onChange: e => { rounds[i].date = e.target.value; } });
          const noteInp = inp({ className: 'input', placeholder: 'Ghi chú...', value: r.note || '', style: { marginBottom: 6, fontSize: 12 }, onInput: e => { rounds[i].note = e.target.value; } });
          const fbInp   = inp({ className: 'input', placeholder: 'Phản hồi của khách...', value: r.feedback || '', style: { fontSize: 12 }, onInput: e => { rounds[i].feedback = e.target.value; } });
          row.appendChild(dateInp); row.appendChild(noteInp); row.appendChild(fbInp);
          roundsList.appendChild(row);
        });
      }
    };

    renderRoundsList();
    modal.appendChild(roundsList);

    // Add round button — only show if no packages (packages have their own + button)
    if (!pkgs.length) {
      modal.appendChild(btn({ className: 'btn btn-secondary btn-sm', style: { marginBottom: 14 }, onClick: () => {
        rounds.push({ label: 'Round ' + (rounds.length + 1), status: 'pending', date: null, note: '', feedback: '' });
        renderRoundsList();
      }}, ['+ Thêm round']));
    }

    modal.appendChild(div({ style: { display: 'flex', gap: 8, justifyContent: 'flex-end' } }, [
      btn({ className: 'btn btn-secondary', onClick: () => setState({ modal: null }) }, ['Huỷ']),
      btn({ className: 'btn btn-primary', onClick: async () => {
        const projects = getProjects();
        const idx = projects.findIndex(x => x.id === S.selectedId);
        if (idx === -1) { showToast('❌ Không tìm thấy dự án!'); return; }
        projects[idx].rounds = rounds;
        await saveAndSync(projects);
        setState({ modal: null });
        showToast('✅ Đã cập nhật rounds');
      }}, ['Lưu']),
    ]));
  }

  else if (S.modal === 'new_monthly' || S.modal === 'edit_monthly') {
    const isEdit = S.modal === 'edit_monthly';
    const mp = isEdit ? S.modalData : null;
    modal.appendChild(div({ className: 'modal-header' }, [
      div({ className: 'modal-title display' }, [isEdit ? 'Sửa dự án tháng' : 'Dự án hàng tháng mới']),
      btn({ className: 'modal-close', onClick: () => setState({ modal: null, modalData: null }) }, ['×']),
    ]));
    const nameInp   = inp({ className: 'input', placeholder: 'Tên dự án (vd: Social Media Café Bình Yên)', value: mp?.name || '' });
    const clientInp = inp({ className: 'input', placeholder: 'Tên khách hàng', value: mp?.client || '' });
    const feeInp    = inp({ className: 'input', type: 'number', placeholder: 'Phí hàng tháng (đ)', value: mp?.fee || '' });
    const startInp  = inp({ className: 'input', type: 'month', value: mp?.startYM || currentYM() });
    const notesInp  = inp({ className: 'input', placeholder: 'Ghi chú...', value: mp?.notes || '' });
    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Tên dự án *']), nameInp]));
    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Khách hàng']), clientInp]));
    modal.appendChild(div({ className: 'grid-2' }, [
      div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Phí/tháng (đ)']), feeInp]),
      div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Bắt đầu từ tháng']), startInp]),
    ]));
    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Ghi chú']), notesInp]));
    modal.appendChild(div({ style: { display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 8 } }, [
      btn({ className: 'btn btn-secondary', onClick: () => setState({ modal: null, modalData: null }) }, ['Huỷ']),
      btn({ className: 'btn btn-primary', onClick: async () => {
        const name = nameInp.value.trim();
        if (!name) { showToast('❌ Nhập tên dự án!'); return; }
        const list = getMonthlyProjects();
        if (isEdit) {
          const idx = list.findIndex(x => x.id === mp.id);
          list[idx] = { ...list[idx], name, client: clientInp.value.trim(), fee: Number(feeInp.value) || 0, startYM: startInp.value, notes: notesInp.value.trim() };
        } else {
          list.push({ id: genMonthlyId(), name, client: clientInp.value.trim(), fee: Number(feeInp.value) || 0, startYM: startInp.value, notes: notesInp.value.trim(), months: [], createdAt: new Date().toISOString() });
        }
        saveMonthlyProjects(list);
        await syncPush();
        setState({ modal: null, modalData: null, listTab: 'monthly', ...(isEdit ? {} : { view: 'monthly_detail', selectedMonthlyId: list[list.length - 1].id }) });
        showToast(isEdit ? '✅ Đã cập nhật' : '✅ Đã tạo dự án tháng!');
      }}, [isEdit ? 'Lưu' : 'Tạo']),
    ]));
  }

  else if (S.modal === 'edit_month') {
    const { mp, mym } = S.modalData;
    const list = getMonthlyProjects();
    const mpi = list.find(x => x.id === mp.id);
    if (!mpi.months) mpi.months = [];
    let rec = mpi.months.find(m => m.ym === mym);
    if (!rec) { rec = { ym: mym, status: 'pending', note: '', paid: false, deliverables: '' }; mpi.months.push(rec); }

    modal.appendChild(div({ className: 'modal-header' }, [
      div({ className: 'modal-title display' }, ['📅 ' + fmtYearMonth(mym)]),
      btn({ className: 'modal-close', onClick: () => setState({ modal: null, modalData: null }) }, ['×']),
    ]));
    const statusSel = el('select', { className: 'input', style: { marginBottom: 10 } }, [
      el('option', { value: 'pending',    ...(rec.status === 'pending'    ? { selected: '' } : {}) }, ['📍 Chưa làm']),
      el('option', { value: 'inprogress', ...(rec.status === 'inprogress' ? { selected: '' } : {}) }, ['🟡 Đang làm']),
      el('option', { value: 'review',     ...(rec.status === 'review'     ? { selected: '' } : {}) }, ['🟣 Chờ duyệt']),
      el('option', { value: 'done',       ...(rec.status === 'done'       ? { selected: '' } : {}) }, ['✅ Hoàn thành']),
    ]);
    const noteInp = inp({ className: 'input', placeholder: 'Ghi chú tháng này...', value: rec.note || '' });
    const delivInp = inp({ className: 'input', placeholder: 'Đã bàn giao gì? (link drive, nội dung...)', value: rec.deliverables || '' });
    const paidChk = inp({ type: 'checkbox', ...(rec.paid ? { checked: '' } : {}), style: { width: 16, height: 16, cursor: 'pointer' } });
    const paidRow = div({ style: { display: 'flex', alignItems: 'center', gap: 8, padding: '10px 0' } });
    paidRow.appendChild(paidChk);
    paidRow.appendChild(el('label', { style: { fontSize: 13, fontWeight: 500, cursor: 'pointer' } }, ['💰 Đã thu phí tháng ' + fmtYearMonth(mym)]));
    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Trạng thái']), statusSel]));
    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Ghi chú']), noteInp]));
    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Đã bàn giao']), delivInp]));
    modal.appendChild(paidRow);
    modal.appendChild(div({ style: { display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 8 } }, [
      btn({ className: 'btn btn-secondary', onClick: () => setState({ modal: null, modalData: null }) }, ['Huỷ']),
      btn({ className: 'btn btn-primary', onClick: async () => {
        const ml = getMonthlyProjects();
        const mli = ml.find(x => x.id === mp.id);
        if (!mli.months) mli.months = [];
        let mr = mli.months.find(m => m.ym === mym);
        if (!mr) { mr = { ym: mym }; mli.months.push(mr); }
        mr.status = statusSel.value;
        mr.note = noteInp.value.trim();
        mr.deliverables = delivInp.value.trim();
        mr.paid = paidChk.checked;
        if (paidChk.checked && !mr.paidAt) mr.paidAt = today();
        saveMonthlyProjects(ml);
        await syncPush();
        setState({ modal: null, modalData: null });
        showToast('✅ Đã cập nhật tháng ' + fmtYearMonth(mym));
      }}, ['Lưu']),
    ]));
  }

  else if (S.modal === 'add_log') {
    const p = getSelectedProject();
    modal.appendChild(div({ className: 'modal-header' }, [
      div({ className: 'modal-title display' }, ['📝 Thêm nhật ký']),
      btn({ className: 'modal-close', onClick: () => setState({ modal: null }) }, ['×']),
    ]));
    const typeInp = el('select', { className: 'input', style: { marginBottom: 10 } }, [
      el('option', { value: '' },          ['-- Loại --']),
      el('option', { value: 'Gửi file' },  ['📤 Gửi file']),
      el('option', { value: 'Họp' },       ['🤝 Họp']),
      el('option', { value: 'Email' },     ['📧 Email']),
      el('option', { value: 'Zalo/Chat' }, ['💬 Zalo/Chat']),
      el('option', { value: 'Gọi điện' }, ['📞 Gọi điện']),
      el('option', { value: 'Khác' },      ['📌 Khác']),
    ]);
    const dateInp = inp({ className: 'input', type: 'date', value: today(), style: { marginBottom: 10 } });
    const sentInp = txt({ className: 'input', placeholder: 'Đã gửi/làm gì?', style: { height: 80, marginBottom: 10, resize: 'vertical' } });
    const responseInp = txt({ className: 'input', placeholder: 'Khách phản hồi gì? (để trống nếu chưa)', style: { height: 70, resize: 'vertical' } });
    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Loại']), typeInp]));
    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Ngày']), dateInp]));
    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Đã làm/gửi gì *']), sentInp]));
    modal.appendChild(div({ className: 'field' }, [el('label', { className: 'input-label' }, ['Phản hồi của khách']), responseInp]));
    modal.appendChild(div({ style: { display: 'flex', gap: 8, justifyContent: 'flex-end' } }, [
      btn({ className: 'btn btn-secondary', onClick: () => setState({ modal: null }) }, ['Huỷ']),
      btn({ className: 'btn btn-primary', onClick: async () => {
        const sent = sentInp.value.trim();
        if (!sent) { showToast('❌ Nhập nội dung!'); return; }
        const projects = getProjects();
        const idx = projects.findIndex(x => x.id === S.selectedId);
        if (idx === -1) { showToast('❌ Không tìm thấy dự án!'); return; }
        if (!projects[idx].logs) projects[idx].logs = [];
        const logEntry = { date: dateInp.value, type: typeInp.value, sent, response: responseInp.value.trim() };
        projects[idx].logs.push(logEntry);
        await saveAndSync(projects);
        // Notify Telegram
        const typeIcon = { 'Gửi file': '📤', 'Họp': '🤝', 'Email': '📧', 'Zalo/Chat': '💬', 'Gọi điện': '📞', 'Khác': '📌' };
        const icon = typeIcon[logEntry.type] || '📝';
        let tgMsg = `${icon} <b>Paz Project</b> — Nhật ký mới\n\n📁 <b>${p.name}</b>\n👤 ${p.client || '—'}\n📅 ${fmtDate(logEntry.date)}${logEntry.type ? ' · ' + logEntry.type : ''}\n\n✏️ ${logEntry.sent}`;
        if (logEntry.response) tgMsg += `\n\n💬 <i>Khách: ${logEntry.response}</i>`;
        tgNotify(tgMsg);
        setState({ modal: null, tab: 'log' });
        showToast('✅ Đã thêm nhật ký');
      }}, ['Thêm']),
    ]));
  }

  else if (S.modal === 'doc_note') {
    const d = S.modalData;
    modal.appendChild(div({ className: 'modal-header' }, [
      div({ className: 'modal-title display' }, ['Ghi chú: ' + d.label]),
      btn({ className: 'modal-close', onClick: () => setState({ modal: null, modalData: null }) }, ['×']),
    ]));
    const driveInp = inp({ className: 'input', placeholder: 'https://drive.google.com/...', value: d.driveUrl || '', style: { marginBottom: 8 } });
    const noteInp = txt({ className: 'input', placeholder: 'Ghi chú cho giấy tờ này...', style: { height: 80, resize: 'vertical' } });
    noteInp.value = d.note;
    modal.appendChild(div({ className: 'field' }, [
      el('label', { className: 'input-label' }, ['🔗 Link Google Drive']),
      driveInp,
      div({ style: { fontSize: 11, color: 'var(--text3)', marginTop: 4 } }, ['Dán link file trên Drive để truy cập nhanh']),
    ]));
    modal.appendChild(div({ className: 'field', style: { marginBottom: 14 } }, [
      el('label', { className: 'input-label' }, ['📝 Ghi chú']),
      noteInp,
    ]));
    modal.appendChild(div({ style: { display: 'flex', gap: 8, justifyContent: 'flex-end' } }, [
      btn({ className: 'btn btn-secondary', onClick: () => setState({ modal: null, modalData: null }) }, ['Huỷ']),
      btn({ className: 'btn btn-primary', onClick: async () => {
        const projects = getProjects();
        const pidxFix = projects.findIndex(x => x.id === d.projectId);
        if (!projects[pidxFix].docs) projects[pidxFix].docs = {};
        projects[pidxFix].docs[d.docId] = {
          ...projects[pidxFix].docs[d.docId],
          note: noteInp.value.trim(),
          driveUrl: driveInp.value.trim(),
        };
        await saveAndSync(projects);
        setState({ modal: null, modalData: null });
        showToast('✅ Đã lưu');
      }}, ['Lưu']),
    ]));
  }

  else if (S.modal === 'edit_payments') {
    const p = getSelectedProject();
    let payments = JSON.parse(JSON.stringify(p.payments || []));
    modal.appendChild(div({ className: 'modal-header' }, [
      div({ className: 'modal-title display' }, ['💰 Đợt thanh toán']),
      btn({ className: 'modal-close', onClick: () => setState({ modal: null }) }, ['×']),
    ]));
    const payList = div({});
    const renderPayList = () => {
      payList.innerHTML = '';
      payments.forEach((pay, i) => {
        const row = div({ style: { marginBottom: 8 } });
        const labelInp = inp({ className: 'input', value: pay.label, style: { fontSize: 12, marginBottom: 4 }, onInput: e => { payments[i].label = e.target.value; } });
        const amtInp   = inp({ className: 'input', type: 'number', value: pay.amount, style: { width: 130, fontSize: 12 }, onInput: e => { payments[i].amount = Number(e.target.value); } });
        const dateInp  = inp({ className: 'input', type: 'date', value: pay.dueDate || '', style: { fontSize: 12 }, onChange: e => { payments[i].dueDate = e.target.value; } });
        const delBtn   = btn({ className: 'btn btn-ghost btn-sm', style: { color: 'var(--red)' }, onClick: () => { payments.splice(i, 1); renderPayList(); } }, ['🗑']);
        row.appendChild(labelInp);
        row.appendChild(div({ style: { display: 'flex', gap: 6 } }, [amtInp, dateInp, delBtn]));
        payList.appendChild(row);
      });
    };
    renderPayList();
    modal.appendChild(payList);
    modal.appendChild(btn({ className: 'btn btn-secondary btn-sm', style: { marginBottom: 14 }, onClick: () => { payments.push({ label: 'Đợt ' + (payments.length + 1), amount: 0, paid: false, paidAt: null, dueDate: null }); renderPayList(); } }, ['+ Thêm đợt']));
    modal.appendChild(div({ style: { display: 'flex', gap: 8, justifyContent: 'flex-end' } }, [
      btn({ className: 'btn btn-secondary', onClick: () => setState({ modal: null }) }, ['Huỷ']),
      btn({ className: 'btn btn-primary', onClick: async () => {
        const projects = getProjects();
        const idx = projects.findIndex(x => x.id === S.selectedId);
        if (idx === -1) { showToast('❌ Không tìm thấy dự án!'); return; }
        projects[idx].payments = payments;
        await saveAndSync(projects);
        setState({ modal: null });
        showToast('✅ Đã cập nhật');
      }}, ['Lưu']),
    ]));
  }

  overlay.appendChild(modal);
  app.appendChild(overlay);
}

// ── Init ───────────────────────────────────────────────────────────────────────
async function init() {
  render();
  await initSync();
  setInterval(checkDeadlines, 3600000);
  checkDeadlines();
  // Auto-start polling if already configured
  const cfg = getConfig();
  if (cfg.tgToken && cfg.tgChatId) {
    startPolling();
  }
}

init();
</script>
</body>
</html>
